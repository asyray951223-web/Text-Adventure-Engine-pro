<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文字冒險引擎 - 編輯器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="editor.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap");
      body {
        font-family: "Noto Sans TC", sans-serif;
      }
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }
      .nav-btn {
        border-left: 4px solid transparent;
        transition: all 0.3s ease;
      }
      .nav-btn:hover {
        background-color: rgba(30, 41, 59, 0.8) !important;
      }
      .nav-btn.active {
        background: linear-gradient(
          90deg,
          rgba(59, 130, 246, 0.15) 0%,
          transparent 100%
        ) !important;
        border-left: 4px solid #3b82f6 !important;
        color: #60a5fa !important;
        font-weight: 700;
      }
      .nav-btn.active svg {
        color: #60a5fa;
        opacity: 1;
      }

      /* --- 工作區清單通用樣式 --- */
      .editor-list-container {
        display: flex;
        flex-direction: column;
        gap: 1rem; /* 16px */
      }
      .editor-list-item {
        background-color: #ffffff;
        border: 1px solid #e2e8f0; /* slate-200 */
        border-radius: 0.75rem; /* 12px */
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        transition: all 0.2s ease-in-out;
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
      }
      .editor-list-item:hover {
        border-color: #94a3b8; /* slate-400 */
        box-shadow:
          0 4px 6px -1px rgb(0 0 0 / 0.1),
          0 2px 4px -2px rgb(0 0 0 / 0.1);
        transform: translateY(-2px);
      }
      .editor-item-header {
        display: flex;
        align-items: center;
        gap: 0.75rem; /* 12px */
      }
      .editor-item-title {
        font-weight: 700;
        font-size: 1.125rem; /* 18px */
        color: #1e293b; /* slate-800 */
      }
      .editor-item-id {
        font-family: monospace;
        font-size: 0.875rem; /* 14px */
        color: #64748b; /* slate-500 */
        background-color: #f1f5f9; /* slate-100 */
        padding: 0.25rem 0.5rem;
        border-radius: 0.375rem; /* 6px */
      }
      .editor-item-actions {
        display: flex;
        gap: 0.5rem; /* 8px */
      }
      .editor-add-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 1rem;
        border: 2px dashed #cbd5e1; /* slate-300 */
        border-radius: 0.75rem; /* 12px */
        color: #64748b; /* slate-500 */
        font-weight: 700;
        transition: all 0.2s ease;
      }
      .editor-add-btn:hover {
        border-color: #3b82f6; /* blue-500 */
        background-color: #eff6ff; /* blue-50 */
        color: #2563eb; /* blue-600 */
      }
    </style>
  </head>
  <body
    class="bg-slate-100 h-screen flex overflow-hidden text-slate-800 custom-scrollbar"
  >
    <!-- 側邊欄標籤式管理 -->
    <aside

    >
      <div
        class="p-6 bg-slate-950 font-extrabold text-xl border-b border-slate-800 flex justify-between items-center shadow-sm"
      >
        <span
          class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 drop-shadow-sm"
          >引擎編輯器</span
        >
        <a
          href="index.html"
          class="text-xs bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-1.5 rounded-full transition shadow-sm border border-slate-700"
          title="返回大廳"
          >返回</a
        >
      </div>
      <nav class="flex-1 overflow-y-auto py-4 space-y-1 custom-scrollbar">
        <button

        >
          <svg
            class="w-5 h-5 mr-3 opacity-80"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"

            <path

            <path

            ></path>
          </svg>

        </button>
        <button

          <svg
            class="w-5 h-5 mr-3 opacity-80"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path

              stroke-linejoin="round"
              stroke-width="2"

            viewBox="0 0 24 24"
          >

              stroke-linecap="round"

        <button

          <svg

            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"
            ></path>
          </svg>
          成就系統
        </button>
        <button
          class="nav-btn flex items-center w-full px-5 py-3 hover:bg-gray-800 transition"
        >
          <svg
            class="w-5 h-5 mr-3 opacity-80"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path

              d="M8 9l3 3-3 3m5 0h3M4 6h16v12H4z"
            ></path>
          </svg>
          測驗系統
        </button>
        <button
          class="nav-btn flex items-center w-full px-5 py-3 hover:bg-gray-800 transition"
        >
          <svg
            class="w-5 h-5 mr-3 opacity-80"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path

            ></path>
          </svg>
          商店系統
        </button>
        <button
          class="nav-btn flex items-center w-full px-5 py-3 hover:bg-gray-800 transition"
        >
          <svg
            class="w-5 h-5 mr-3 opacity-80"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"
            ></path>
          </svg>
          時間系統
        </button>
      </nav>
      <div
        class="p-5 border-t border-slate-800 bg-slate-900 flex flex-col gap-3"
      >
        <button
          id="save-project-btn"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-bold py-3 rounded-xl transition-all duration-300 shadow-[0_4px_15px_rgba(37,99,235,0.3)] hover:shadow-[0_6px_20px_rgba(37,99,235,0.4)] hover:-translate-y-0.5 flex items-center justify-center border border-blue-400/30"
        >
          <svg
            class="w-4 h-4 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
            ></path>
          </svg>
          保存專案
        </button>
        <a
          href="player1.html"
          id="play-game-link"
          class="w-full bg-gradient-to-r from-purple-600 to-purple-500 hover:from-purple-500 hover:to-purple-400 text-white font-bold py-3 rounded-xl transition-all duration-300 shadow-[0_4px_15px_rgba(147,51,234,0.3)] hover:shadow-[0_6px_20px_rgba(147,51,234,0.4)] hover:-translate-y-0.5 flex items-center justify-center border border-purple-400/30"
        >
          <svg
            class="w-4 h-4 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"

    <!-- 主要編輯區塊 -->
    <main class="flex-1 p-8 md:p-10 overflow-y-auto custom-scrollbar relative">
      <header
        class="mb-8 flex justify-between items-end pb-5 border-b-2 border-slate-200/60"
      >
        <h2
          class="text-4xl font-black text-slate-800 tracking-tight drop-shadow-sm"
        >
          基本資訊
        </h2>
        <div class="flex items-center space-x-5">
          <span
            id="last-save-time"
            class="text-sm font-medium text-slate-500 bg-slate-200/50 px-4 py-1.5 rounded-full shadow-inner border border-slate-200"
            >最後保存時間: 尚未保存</span
          >
          <a
            href="test.html"
            id="test-game-link"
            class="bg-gradient-to-r from-emerald-600 to-teal-500 hover:from-emerald-500 hover:to-teal-400 text-white px-5 py-2.5 rounded-xl font-bold shadow-[0_4px_15px_rgba(5,150,105,0.3)] hover:shadow-[0_6px_20px_rgba(5,150,105,0.4)] transition-all duration-300 hover:-translate-y-0.5 flex items-center border border-emerald-400/30"
          >
            <svg
              class="w-5 h-5 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
              ></path>
            </svg>
            測試遊戲
          </a>
        </div>
      </header>

      <section
        class="bg-white/80 backdrop-blur-xl border border-white rounded-3xl p-8 shadow-[0_8px_30px_rgb(0,0,0,0.06)] min-h-[65vh] relative z-10"
      >
        <!-- 內容區將由 editor.js 動態渲染 -->
      </section>
    </main>
    <script src="js/editor.js"></script>
    <script src="js/chapter.js"></script>
    <script src="js/scene.js"></script>
    <script src="js/item.js"></script>
    <script src="js/npc.js"></script>
    <script src="js/variables.js"></script>
    <script src="js/trigger.js"></script>
    <script src="js/achievement.js"></script>
    <script src="js/dictionary.js"></script>
    <script src="js/shop.js"></script>
    <script src="js/quiz.js"></script>
    <script src="js/time.js"></script>
  </body>
</html>
