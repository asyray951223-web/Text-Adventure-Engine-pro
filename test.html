<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>測試模式 - 引擎除錯</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="player1.css" />
    <link rel="stylesheet" href="test.css" />
    <link rel="stylesheet" href="css/mobile.css" />
    <style>
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(31, 41, 55, 0.5);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(75, 85, 99, 0.8);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(107, 114, 128, 1);
      }
      .debug-glass {
        background: linear-gradient(
          135deg,
          rgba(17, 24, 39, 0.85) 0%,
          rgba(31, 41, 55, 0.95) 100%
        );
        box-shadow:
          inset 0 0 20px rgba(0, 0, 0, 0.5),
          5px 0 25px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body
    class="bg-gray-950 bg-[radial-gradient(circle_at_center,rgba(31,41,55,0.5)_0,rgba(3,7,18,1)_100%)] h-screen w-full flex overflow-hidden"
  >
    <!-- 背景音樂播放器 -->
    <audio id="test-bgm-player" loop></audio>

    <!-- 左側開發者除錯面板 -->
    <div
      id="debug-panel"
      class="w-96 shrink-0 debug-glass border-r border-gray-700/50 text-white p-6 z-50 overflow-y-auto backdrop-blur-xl custom-scrollbar flex flex-col relative h-full"
    >
      <h3
        class="text-xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-teal-200 mb-6 border-b border-gray-700/50 pb-4 flex items-center drop-shadow-sm"
      >
        <svg
          class="w-5 h-5 mr-2 text-emerald-400"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"
          ></path>
        </svg>
        開發者除錯面板
      </h3>

      <div class="mb-6 shrink-0">
        <h4 class="text-gray-300 font-bold mb-3 text-sm flex items-center">
          <svg
            class="w-4 h-4 mr-1.5 text-blue-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 10V3L4 14h7v7l9-11h-7z"
            ></path></svg
          >強制跳轉場景
        </h4>
        <select
          id="debug-scene-select"
          class="w-full bg-gray-900/80 p-2.5 rounded-lg font-mono text-blue-300 border border-gray-600/50 text-sm focus:outline-none focus:border-blue-400 focus:ring-1 focus:ring-blue-400/50 transition mb-3 shadow-inner"
        >
          <!-- 選項由 JS 動態產生 -->
        </select>
        <button
          id="force-jump-btn"
          class="w-full bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 py-2.5 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(37,99,235,0.3)] hover:shadow-[0_0_20px_rgba(37,99,235,0.5)] font-bold text-sm border border-blue-400/30 text-white"
        >
          執行跳轉
        </button>
      </div>

      <div class="mb-6 flex-1 flex flex-col min-h-0">
        <h4
          class="text-gray-300 font-bold mb-3 text-sm flex items-center shrink-0"
        >
          <svg
            class="w-4 h-4 mr-1.5 text-purple-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"
            ></path></svg
          >全域變數監控
        </h4>
        <ul
          id="debug-variables-list"
          class="bg-gray-900/80 p-3 rounded-lg space-y-2 border border-gray-600/50 text-sm shadow-inner overflow-y-auto custom-scrollbar flex-1 min-h-[100px] mb-4"
        >
          <!-- 變數由 JS 動態產生 -->
        </ul>

        <h4
          class="text-gray-300 font-bold mb-3 text-sm flex items-center shrink-0"
        >
          <svg
            class="w-4 h-4 mr-1.5 text-amber-400"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            ></path></svg
          >持有道具監控
        </h4>
        <ul
          id="debug-items-list"
          class="bg-gray-900/80 p-3 rounded-lg space-y-2 border border-gray-600/50 text-sm shadow-inner overflow-y-auto custom-scrollbar flex-1 min-h-[100px]"
        >
          <!-- 道具由 JS 動態產生 -->
        </ul>
      </div>

      <div
        class="mt-auto pt-5 border-t border-gray-700/50 shrink-0 flex flex-col gap-3"
      >
        <button
          onclick="window.openSettings()"
          class="flex items-center justify-center w-full bg-gradient-to-r from-purple-800 to-purple-700 hover:from-purple-700 hover:to-purple-600 text-center py-2.5 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(107,33,168,0.3)] hover:shadow-[0_0_20px_rgba(107,33,168,0.5)] font-bold text-sm border border-purple-500/30 text-white"
        >
          <svg
            class="w-4 h-4 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
            ></path>
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
            ></path>
          </svg>
          環境設定
        </button>
        <button
          onclick="window.editCurrentScene()"
          class="flex items-center justify-center w-full bg-gradient-to-r from-blue-800 to-blue-700 hover:from-blue-700 hover:to-blue-600 text-center py-2.5 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(30,64,175,0.3)] hover:shadow-[0_0_20px_rgba(30,64,175,0.5)] font-bold text-sm border border-blue-500/30 text-white"
        >
          <svg
            class="w-4 h-4 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
            ></path>
          </svg>
          編輯當前場景
        </button>
        <button
          onclick="window.location.reload()"
          class="flex items-center justify-center w-full bg-gradient-to-r from-gray-700 to-gray-600 hover:from-gray-600 hover:to-gray-500 text-center py-2.5 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(75,85,99,0.3)] hover:shadow-[0_0_20px_rgba(75,85,99,0.5)] font-bold text-sm border border-gray-500/30 text-white"
        >
          <svg
            class="w-4 h-4 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
            ></path>
          </svg>
          重新載入測試
        </button>
        <a
          href="editor.html"
          class="flex items-center justify-center w-full bg-gradient-to-r from-red-800 to-red-700 hover:from-red-700 hover:to-red-600 text-center py-2.5 rounded-lg transition-all duration-300 shadow-[0_0_15px_rgba(185,28,28,0.3)] hover:shadow-[0_0_20px_rgba(185,28,28,0.5)] font-bold text-sm border border-red-500/30 text-white"
        >
          <svg
            class="w-4 h-4 mr-2"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
            ></path>
          </svg>
          結束測試 (返回編輯器)
        </a>
      </div>
    </div>

    <!-- 遊戲預覽容器 (填滿右側剩餘空間) -->
    <div
      id="game-container"
      class="relative flex-1 h-full bg-gray-900 overflow-hidden"
    >
      <!-- 沉浸式背景圖 -->
      <div
        id="test-bg"
        class="absolute inset-0 bg-cover bg-center"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1518709268805-4e9042af9f23?q=80&w=1920&auto=format&fit=crop&quot;);
          opacity: 0.5;
        "
      ></div>

      <!-- 事件 CG 影片 -->
      <video
        id="test-scene-cg-video"
        class="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 opacity-0 pointer-events-none z-10 hidden"
        playsinline
        loop
      ></video>

      <!-- 角色立繪 -->
      <img
        id="test-scene-sprite"
        class="absolute top-24 bottom-0 left-[10%] w-full max-w-xl object-contain object-bottom transition-opacity duration-500 opacity-0 pointer-events-none z-20 hidden"
        alt="角色立繪"
      />

      <!-- 底部對話框 -->
      <div
        class="absolute bottom-8 left-1/2 -translate-x-1/2 w-11/12 max-w-6xl z-40"
      >
        <div
          class="relative bg-gray-900/85 border-2 border-emerald-500/40 rounded-xl p-6 backdrop-blur-md shadow-[0_10px_30px_rgba(0,0,0,0.8)] debug-outline transition-colors hover:border-emerald-400/60"
        >
          <!-- 對話框上方的計時器 -->
          <div
            id="test-dialogue-timer-container"
            class="absolute -top-2 left-1/2 -translate-x-1/2 w-1/2 h-1.5 bg-gray-800 rounded-full overflow-hidden border border-gray-600 transition-all duration-300 hidden z-20"
          >
            <div
              id="test-dialogue-timer-bar"
              class="h-full bg-red-500 w-full transition-all duration-100 ease-linear"
            ></div>
          </div>

          <div
            id="test-dialogue-name"
            class="absolute -top-4 left-6 bg-gradient-to-r from-emerald-800 to-emerald-600 text-white px-6 py-1.5 rounded-md border border-emerald-500/50 font-bold text-lg tracking-wider shadow-[0_0_15px_rgba(4,120,87,0.6)] z-10"
          >
            系統測試員
          </div>
          <div class="flex gap-6 items-start mt-2">
            <img
              id="test-dialogue-avatar"
              class="hidden w-24 h-24 object-cover rounded-lg border-2 border-gray-600 shadow-md flex-shrink-0"
              alt="NPC Avatar"
            />
            <div class="flex-1 w-full">
              <div
                id="test-dialogue-text"
                class="text-gray-100 text-xl leading-relaxed min-h-[100px] max-h-[180px] overflow-y-auto custom-scrollbar font-medium pr-4 pointer-events-auto"
              >
                這裡是測試模式！<br />您可以透過左側的「除錯面板」隨時監控變數或強制跳轉場景。
              </div>
              <div
                id="test-options-container"
                class="mt-5 flex flex-wrap gap-3 empty:hidden"
              >
                <!-- 測試選項由 JS 動態產生 -->
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- 設定 Modal -->
      <div
        id="settings-modal"
        class="absolute inset-0 bg-black/80 hidden flex-col items-center justify-center z-[100] backdrop-blur-sm transition-opacity duration-300 opacity-0"
      >
        <div
          class="bg-gray-900 border border-gray-600 rounded-xl w-11/12 max-w-md flex flex-col shadow-2xl relative"
        >
          <div
            class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800 rounded-t-xl"
          >
            <h2 class="text-2xl font-bold text-purple-400">測試環境設定</h2>
            <button
              id="close-settings-btn"
              class="text-gray-400 hover:text-white transition"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
          <div class="p-6 space-y-6">
            <div>
              <label class="block text-sm font-bold text-gray-300 mb-2"
                >背景音量</label
              >
              <input
                type="range"
                id="volume-range"
                min="0"
                max="100"
                value="50"
                class="w-full cursor-pointer accent-purple-500"
              />
              <div class="flex justify-between text-xs text-gray-500 mt-1">
                <span>靜音</span><span>最大</span>
              </div>
            </div>
            <div
              class="text-xs text-gray-400 bg-gray-800 p-3 rounded border border-gray-700"
            >
              💡
              提示：測試模式中為了快速推進與除錯，已強制關閉打字機動畫，因此不提供文字顯示速度設定。此處的音量設定將與正式遊玩模式共用。
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="js/test.js"></script>
  </body>
</html>
