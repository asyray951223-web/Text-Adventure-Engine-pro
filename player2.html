<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>遊玩模式 - 中國傳統風格</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="player1.css" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&display=swap");

      body {
        font-family: "Noto Serif TC", serif;
      }

      /* 自訂古典捲軸 */
      #custom-scrollbar-style {
        display: none;
      } /* 隱藏系統預設注入的捲軸 */
      .custom-scrollbar::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(26, 21, 18, 0.4);
        border-radius: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(139, 115, 85, 0.8);
        border-radius: 4px;
        border: 1px solid #5e4835;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(205, 168, 124, 0.9);
      }

      /* -----------------------------------------------------
         核心 UI 覆蓋：讓 player.js 動態產生的介面自動「換皮」 
         ----------------------------------------------------- */

      /* 彈出視窗與卡片底色 (宣紙/墨黑) */
      .bg-gray-900,
      #dictionary-panel,
      #shop-panel,
      #quiz-panel,
      #inventory-panel {
        background-color: rgba(26, 21, 18, 0.95) !important;
      }
      .bg-gray-800 {
        background-color: rgba(44, 34, 26, 0.95) !important;
      }
      .bg-black\/80 {
        background-color: rgba(18, 14, 12, 0.85) !important;
      }
      .bg-black\/60 {
        background-color: rgba(26, 21, 18, 0.8) !important;
      } /* 讓辭典懸浮按鈕與頂部狀態列更貼合木竹主題 */

      /* 邊框顏色 (竹簡/木紋) */
      .border-gray-500,
      .border-gray-600,
      .border-gray-700,
      .border-gray-800 {
        border-color: #8b7355 !important;
      }
      .border-blue-800 {
        border-color: #8b7355 !important;
      }
      .hover\:border-blue-400:hover {
        border-color: #cda87c !important;
      }

      /* 動態選項按鈕 (.vn-option) */
      .vn-option {
        background-color: rgba(44, 34, 26, 0.9) !important;
        border-color: #8b7355 !important;
        color: #f5ebd9 !important;
        font-family: "Noto Serif TC", serif !important;
        letter-spacing: 0.05em;
      }
      .vn-option:hover {
        background-color: rgba(74, 54, 35, 0.95) !important;
        border-color: #cda87c !important;
        box-shadow: 0 0 15px rgba(205, 168, 124, 0.3) !important;
      }

      /* 頂部動態數值列與按鈕 (中國風八邊形牌匾) */
      #top-bar-vars > div,
      .top-action-btn {
        position: relative;
        border-radius: 0 !important;
        border: none !important;
        background: linear-gradient(
          180deg,
          rgba(60, 45, 35, 0.9) 0%,
          rgba(35, 25, 20, 0.9) 100%
        ) !important;
        clip-path: polygon(
          10px 0,
          calc(100% - 10px) 0,
          100% 10px,
          100% calc(100% - 10px),
          calc(100% - 10px) 100%,
          10px 100%,
          0 calc(100% - 10px),
          0 10px
        );
        box-shadow: none !important;
        color: #f5ebd9 !important;
        z-index: 1;
      }

      /* 八邊形內框金線裝飾 */
      #top-bar-vars > div::before,
      .top-action-btn::before {
        content: "";
        position: absolute;
        inset: 2px;
        background: transparent;
        border-top: 1px solid #cda87c;
        border-bottom: 1px solid #cda87c;
        border-left: 1px solid #8b7355;
        border-right: 1px solid #8b7355;
        clip-path: polygon(
          8px 0,
          calc(100% - 8px) 0,
          100% 8px,
          100% calc(100% - 8px),
          calc(100% - 8px) 100%,
          8px 100%,
          0 calc(100% - 8px),
          0 8px
        );
        z-index: -1;
        pointer-events: none;
        transition: all 0.3s ease;
      }

      /* 懸停發光效果 */
      .top-action-btn:hover {
        background: linear-gradient(
          180deg,
          rgba(80, 60, 45, 0.95) 0%,
          rgba(45, 35, 25, 0.95) 100%
        ) !important;
      }
      .top-action-btn:hover::before {
        border-color: #ffd700;
        box-shadow: inset 0 0 8px rgba(255, 215, 0, 0.3);
      }

      /* 針對離開按鈕的特例色 */
      a.top-action-btn {
        background: linear-gradient(
          180deg,
          rgba(139, 35, 35, 0.9) 0%,
          rgba(94, 20, 20, 0.9) 100%
        ) !important;
      }
      a.top-action-btn:hover {
        background: linear-gradient(
          180deg,
          rgba(165, 42, 42, 0.95) 0%,
          rgba(139, 35, 35, 0.95) 100%
        ) !important;
      }

      /* 文字顏色覆蓋 (金/玉/砂紅) */
      .text-gray-400 {
        color: #b8a892 !important;
      }
      .text-gray-300,
      .text-gray-100 {
        color: #d3c4b1 !important;
      }
      .text-blue-400,
      .text-blue-300,
      .text-yellow-400 {
        color: #cda87c !important;
      } /* 主題強調色統一轉為暗金/木色 */
      .text-blue-200 {
        color: #f5ebd9 !important;
      }
      .text-red-400 {
        color: #c84b31 !important;
      } /* 硃砂紅 */
      .text-emerald-400 {
        color: #6db08c !important;
      } /* 玉石綠 */

      /* 動態按鈕覆蓋 */
      .bg-blue-600,
      .from-blue-600 {
        background-color: #8b2323 !important;
        --tw-gradient-from: #8b2323 !important;
        border-color: #5e1414 !important;
      }
      .hover\:bg-blue-500:hover,
      .hover\:from-blue-500:hover {
        background-color: #a52a2a !important;
        --tw-gradient-from: #a52a2a !important;
      }
      .bg-emerald-600 {
        background-color: #4a755d !important;
        border-color: #2f4d3c !important;
      }
      .hover\:bg-emerald-500:hover {
        background-color: #598c70 !important;
      }
      .bg-red-600 {
        background-color: #8b2323 !important;
      }

      /* 標籤覆蓋 */
      .bg-blue-900\/50,
      .bg-purple-900\/50,
      .bg-orange-900\/50 {
        background-color: rgba(139, 115, 85, 0.2) !important;
      }
      .border-purple-700\/50,
      .border-orange-700\/50 {
        border-color: #8b7355 !important;
      }
      .text-purple-400,
      .text-orange-400 {
        color: #cda87c !important;
      }
    </style>
  </head>
  <body
    class="bg-[#120f0d] h-screen flex items-center justify-center overflow-hidden"
  >
    <!-- 背景音樂播放器 -->
    <audio id="bgm-player" loop></audio>

    <!-- 遊戲主要容器 (全螢幕) -->
    <div
      id="game-container"
      class="relative w-full h-full bg-[#120f0d] overflow-hidden"
    >
      <!-- 快速存檔提示 -->
      <div
        id="quicksave-toast"
        class="absolute top-20 left-1/2 -translate-x-1/2 bg-[#8b2323] border border-[#cda87c] text-[#f5ebd9] px-6 py-2 rounded-full shadow-lg font-bold transition-opacity duration-300 opacity-0 pointer-events-none z-50 tracking-widest"
      >
        進度已保存
      </div>

      <!-- 存檔 Modal -->
      <div
        id="save-modal"
        class="absolute inset-0 bg-[#000000]/80 hidden flex-col items-center justify-center z-50 backdrop-blur-sm transition-opacity duration-300 opacity-0"
      >
        <div
          class="bg-[#1a1512] border-2 border-[#8b7355] rounded-xl w-11/12 max-w-2xl flex flex-col shadow-2xl relative"
        >
          <div
            class="p-4 border-b border-[#8b7355] flex justify-between items-center bg-[#2c221a] rounded-t-xl"
          >
            <div class="flex items-center space-x-3">
              <svg
                class="w-8 h-8 text-[#cda87c]"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
                ></path>
              </svg>
              <div>
                <h2 class="text-2xl font-bold text-[#f5ebd9] tracking-widest">
                  記載卷軸
                </h2>
                <p class="text-xs text-[#b8a892] mt-1">銘刻您當前的塵世足跡</p>
              </div>
            </div>
            <button
              id="close-save-btn"
              class="text-[#8b7355] hover:text-[#cda87c] transition"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
          <div class="p-6 space-y-4" id="save-slots-container">
            <!-- 存檔槽位由 JS 動態產生 -->
          </div>
        </div>
      </div>

      <!-- 沉浸式背景圖 -->
      <div
        class="absolute inset-0 bg-cover bg-center transition-all duration-1000"
        style="
          background-image: url(&quot;https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1920&auto=format&fit=crop&quot;);
          opacity: 0.8;
        "
      ></div>

      <!-- 事件 CG 影片 -->
      <video
        id="scene-cg-video"
        class="absolute inset-0 w-full h-full object-cover transition-opacity duration-1000 opacity-0 pointer-events-none z-10 hidden"
        playsinline
        loop
      ></video>

      <!-- 角色立繪 -->
      <img
        id="scene-sprite"
        class="absolute top-24 bottom-0 left-[10%] w-full max-w-xl object-contain object-bottom transition-opacity duration-500 opacity-0 pointer-events-none z-20 hidden"
        src=""
        alt="角色立繪"
      />

      <!-- 設定 Modal -->
      <div
        id="settings-modal"
        class="absolute inset-0 bg-[#000000]/80 hidden flex-col items-center justify-center z-50 backdrop-blur-sm transition-opacity duration-300 opacity-0"
      >
        <div
          class="bg-[#1a1512] border-2 border-[#8b7355] rounded-xl w-11/12 max-w-md flex flex-col shadow-2xl relative"
        >
          <div
            class="p-4 border-b border-[#8b7355] flex justify-between items-center bg-[#2c221a] rounded-t-xl"
          >
            <h2 class="text-2xl font-bold text-[#cda87c] tracking-widest">
              系統設置
            </h2>
            <button
              id="close-settings-btn"
              class="text-[#8b7355] hover:text-[#cda87c] transition"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
          <div class="p-6 space-y-6">
            <div>
              <label
                class="block text-sm font-bold text-[#d3c4b1] mb-2 flex justify-between"
                ><span>文字浮現速度</span
                ><span
                  id="speed-display"
                  class="text-[#cda87c] font-mono"
                ></span
              ></label>
              <input
                type="range"
                id="text-speed-range"
                min="0"
                max="100"
                value="70"
                class="w-full cursor-pointer accent-[#8b7355]"
              />
              <div class="flex justify-between text-xs text-[#b8a892] mt-1">
                <span>緩慢</span><span>瞬息</span>
              </div>
            </div>
            <div>
              <label class="block text-sm font-bold text-[#d3c4b1] mb-2"
                >背景絲竹音量</label
              >
              <input
                type="range"
                id="volume-range"
                min="0"
                max="100"
                value="50"
                class="w-full cursor-pointer accent-[#8b7355]"
              />
            </div>
            <div>
              <label class="block text-sm font-bold text-[#d3c4b1] mb-2"
                >落筆音量</label
              >
              <input
                type="range"
                id="typing-volume-range"
                min="0"
                max="100"
                value="50"
                class="w-full cursor-pointer accent-[#8b7355]"
              />
            </div>
          </div>
        </div>
      </div>

      <!-- 物品欄 Modal -->
      <div
        id="inventory-modal"
        class="absolute inset-0 bg-black/50 hidden z-50 backdrop-blur-sm transition-opacity duration-300 opacity-0"
      >
        <div
          id="inventory-panel"
          class="absolute bottom-6 right-6 bg-[#1a1512]/95 border-2 border-[#8b7355] rounded-2xl w-full max-w-2xl h-[85vh] flex flex-col shadow-[0_10px_50px_rgba(0,0,0,0.8)] transform transition-all duration-300 translate-y-8 scale-95 origin-bottom-right"
        >
          <div
            class="p-5 border-b border-[#8b7355] flex justify-between items-center bg-[#2c221a]/80 rounded-t-2xl"
          >
            <div class="flex items-center space-x-3">
              <svg
                class="w-8 h-8 text-[#cda87c]"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
                ></path>
              </svg>
              <div>
                <h2 class="text-2xl font-bold text-[#f5ebd9] tracking-widest">
                  行囊
                </h2>
                <p class="text-xs text-[#b8a892] mt-1">
                  盤點您於塵世間收集之物
                </p>
              </div>
            </div>
            <button
              id="close-inventory-btn"
              class="text-[#8b7355] hover:text-[#f5ebd9] bg-[#1a1512] hover:bg-[#3d2e24] p-2 rounded-full transition border border-[#8b7355]"
            >
              <svg
                class="w-6 h-6"
                fill="none"
                stroke="currentColor"
                viewBox="0 0 24 24"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M6 18L18 6M6 6l12 12"
                ></path>
              </svg>
            </button>
          </div>
          <div class="p-6 overflow-y-auto flex-1 custom-scrollbar">
            <div
              id="inventory-container"
              class="grid grid-cols-1 sm:grid-cols-2 gap-5"
            >
              <!-- 道具將由 JS 動態產生 -->
            </div>
          </div>
        </div>
      </div>

      <!-- 章節開場畫面 -->
      <div
        id="chapter-screen"
        class="absolute inset-0 z-50 bg-[#0a0806] bg-cover bg-center flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-1000"
      >
        <div
          class="bg-[#1a1512]/80 p-10 rounded-sm backdrop-blur-md text-center max-w-4xl mx-4 shadow-2xl border-y-2 border-[#8b7355]"
        >
          <h1
            id="chapter-screen-title"
            class="text-5xl font-extrabold text-[#cda87c] mb-6 tracking-[0.2em] drop-shadow-lg"
            style="writing-mode: horizontal-tb"
          ></h1>
          <p
            id="chapter-screen-desc"
            class="text-2xl text-[#d3c4b1] leading-loose drop-shadow-md"
          ></p>
        </div>
        <div
          class="absolute bottom-10 text-[#8b7355] text-lg animate-pulse select-none cursor-pointer tracking-widest"
        >
          — 觸碰以展卷 —
        </div>
      </div>

      <!-- 成就解鎖浮出提示容器 -->
      <div
        id="achievement-popup-container"
        class="absolute top-20 right-4 z-50 flex flex-col gap-3 pointer-events-none overflow-visible"
      ></div>

      <!-- 頂部資訊列 (數值系統) -->
      <div
        class="absolute top-0 left-0 right-0 p-4 flex justify-between items-start z-40"
      >
        <div id="top-bar-vars" class="flex flex-wrap gap-4 max-w-[70%]">
          <!-- 動態變數渲染區塊 -->
        </div>
        <div class="flex gap-2">
          <button
            id="fullscreen-btn"
            class="top-action-btn bg-[#2c221a]/80 hover:bg-[#3d2e24] text-[#cda87c] px-4 py-2 rounded border border-[#8b7355] transition flex items-center shadow-md"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"
              ></path>
            </svg>
            <span>全螢幕</span>
          </button>
          <button
            id="toggle-ui-btn"
            class="top-action-btn bg-[#2c221a]/80 hover:bg-[#3d2e24] text-[#cda87c] px-4 py-2 rounded border border-[#8b7355] transition flex items-center shadow-md"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"
              ></path>
            </svg>
            <span>隱藏介面</span>
          </button>
          <button
            id="save-menu-btn"
            class="top-action-btn bg-[#2c221a]/80 hover:bg-[#3d2e24] text-[#cda87c] px-4 py-2 rounded border border-[#8b7355] transition flex items-center shadow-md"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"
              ></path>
            </svg>
            <span>記載</span>
          </button>
          <button
            id="settings-btn"
            class="top-action-btn bg-[#2c221a]/80 hover:bg-[#3d2e24] text-[#cda87c] px-4 py-2 rounded border border-[#8b7355] transition flex items-center shadow-md"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"
              ></path>
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"
              ></path>
            </svg>
            <span>設置</span>
          </button>
          <a
            href="index.html"
            class="top-action-btn bg-[#8b2323]/80 hover:bg-[#5e1414]/90 text-[#f5ebd9] px-4 py-2 rounded border border-[#5e1414] transition flex items-center shadow-md"
          >
            <svg
              class="w-4 h-4 mr-2"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
              ></path>
            </svg>
            <span>離去</span>
          </a>
        </div>
      </div>

      <!-- 智慧跳轉選項區 (由 player.js 動態渲染) -->
      <div
        class="absolute inset-0 flex flex-col items-center justify-center gap-5 z-30 hidden pointer-events-none"
        id="options-layer"
      ></div>

      <!-- 底部對話框 (古典墨韻風格) -->
      <div
        class="absolute bottom-8 left-1/2 -translate-x-1/2 w-11/12 max-w-5xl z-40"
      >
        <div
          id="dialogue-box"
          class="relative bg-[#1a1512]/90 border-4 border-double border-[#8b7355] rounded-sm p-8 backdrop-blur-sm shadow-[0_0_30px_rgba(26,21,18,0.9)] cursor-pointer transition"
        >
          <!-- 對話框上方的計時器 (香/燃燭) -->
          <div
            id="dialogue-timer-container"
            class="absolute -top-4 left-1/2 -translate-x-1/2 w-2/3 max-w-lg h-2 bg-[#2c221a] rounded-full overflow-hidden border border-[#5e4835] shadow-[0_0_10px_rgba(200,75,49,0)] transition-all duration-300 hidden"
          >
            <div
              id="dialogue-timer-bar"
              class="h-full bg-[#c84b31] w-full transition-all duration-100 ease-linear shadow-[0_0_8px_#c84b31]"
            ></div>
          </div>

          <!-- 姓名標籤 (印章/名牌風格) -->
          <div
            id="dialogue-name"
            class="absolute -top-8 left-6 bg-[#8b2323] text-[#f5ebd9] px-8 py-2 border-2 border-[#5e1414] font-bold text-xl tracking-[0.2em] shadow-[0_4px_15px_rgba(139,35,35,0.6)] z-10"
            style="border-radius: 2px"
          >
            說書人
          </div>

          <div class="flex gap-8 items-start mt-2">
            <!-- 頭像 -->
            <img
              id="dialogue-avatar"
              class="hidden w-32 h-32 object-cover rounded-sm border-2 border-[#8b7355] shadow-md flex-shrink-0"
              src=""
              alt="NPC Avatar"
            />
            <div class="flex-1 w-full">
              <!-- 對話文本 -->
              <div
                id="dialogue-text"
                class="text-[#e8e0d5] text-2xl leading-[1.8] min-h-[140px] select-none tracking-wide"
              >
                字句將於此處緩緩浮現...
              </div>
            </div>
          </div>
          <!-- 點擊繼續提示 -->
          <div
            class="absolute bottom-4 right-6 text-[#8b7355] text-sm animate-pulse select-none pointer-events-none tracking-widest"
          >
            ▼ 觸碰以延續
          </div>
        </div>
      </div>

      <!-- 獨立的物品欄懸浮按鈕 (古典玉珮/令牌風格) -->
      <button
        id="inventory-btn"
        class="absolute bottom-6 md:bottom-10 right-4 md:right-10 z-50 flex items-center justify-center space-x-3 bg-[#2c221a]/95 hover:bg-[#3d2e24] border-2 border-[#8b7355] hover:border-[#cda87c] text-[#f5ebd9] p-3 md:px-6 md:py-4 rounded-full backdrop-blur-md shadow-[0_10px_40px_rgba(0,0,0,0.8)] transition-all transform hover:scale-105 group"
      >
        <div
          class="relative bg-[#1a1512] p-2 md:p-3 rounded-full border border-[#8b7355] group-hover:border-[#cda87c] transition-colors shadow-inner"
        >
          <svg
            class="w-6 h-6 md:w-8 md:h-8 text-[#cda87c] group-hover:text-[#ffd700] transition-colors drop-shadow"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"
            ></path>
          </svg>
        </div>
        <div class="text-left hidden md:block pr-2">
          <div
            class="font-bold text-lg tracking-widest text-[#cda87c] group-hover:text-[#ffd700] transition-colors drop-shadow-sm"
          >
            行囊
          </div>
          <div
            class="text-xs text-[#8b7355] group-hover:text-[#b8a892] transition-colors mt-0.5 tracking-wider"
          >
            盤點持有之物
          </div>
        </div>
      </button>
    </div>

    <!-- 必須引入 player.js 核心邏輯 -->
    <script src="js/player.js"></script>
  </body>
</html>
